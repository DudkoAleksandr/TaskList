<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <section class="container">
      <div class="input__main">
        <input class="input" type="text" placeholder="Введите задачу..." />
        <div>
          <select class="select__level" name="" id="">
            <option value="level__low" selected disabled>
              Приоритет задачи
            </option>
            <option value="level__low">Легкий</option>
            <option value="level__medium">Средний</option>
            <option value="level__high">Высокий</option>
          </select>
        </div>
        <div class="input__btn">
          <button class="btn btn__click">Добавить</button>
          <button class="btn btn__del">Очистить</button>
        </div>
      </div>
      <input class="search" type="text" placeholder="Поиск">
      <ol class="div"></ol>
    </section>
    <script src="./script.js"></script>
    <script src="./function.js"></script>
  </body>
</html>
