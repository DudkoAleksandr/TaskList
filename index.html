<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <section class="container">
      <nav class="container__nav">
        <button class="btn add__task" type="button">Добавить задачу</button>
        <button class="btn btn__del" type="button">Очистить</button>
      </nav>
      <div class="container__main">
        <div class="form hidden__tasks modal">
          <div class="input__main modal__container">
            <button class="modal__close">X</button>
            <input class="theme__task" type="text" placeholder="Название задачи">
            <input class="input" type="text" placeholder="Введите задачу" />
            <div>
              <select class="select__level" name="" id="">
                <option value="level__low" selected disabled>
                  Приоритет задачи
                </option>
                <option value="level__low">Легкий</option>
                <option value="level__medium">Средний</option>
                <option value="level__high">Высокий</option>
              </select>
            </div>
            <div class="input__btn">
              <button class="btn btn__click" type="button">Добавить</button>
            </div>
          </div>
        </div>
        <input class="search" type="text" placeholder="Поиск задач" />
        <select class="select__sort-tasks" name="" id="">
          <option value="" selected disabled>Сортировать по:</option>
          <option value="name__task">Назвнию задачи</option>
          <option value="main__task">Описанию задачи</option>
        </select>
        <ol class="div"></ol>
      </div>
    </section>
    <script src="./script.js"></script>
    <script src="./function.js"></script>
    <script src="./storage.js"></script>
  </body>
</html>
